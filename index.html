<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>おみくじアプリ</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin-top: 100px;
      background: #f5f5f5;
    }
    h1 {
      font-size: 32px;
    }
    #result {
      font-size: 48px;
      margin: 30px 0;
      font-weight: bold;
    }
    .daikichi { color: gold; }
    .chuukichi { color: green; }
    .shoukichi { color: #333; }
    .kyou { color: red; }

    button {
      font-size: 18px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>おみくじ</h1>
  <div id="result">ボタンを押してください</div>
  <button onclick="drawOmikuji()">引く</button>

  <script>
    function drawOmikuji() {
      const rand = Math.random();

      let result = {};

      if (rand < 0.1) {
        result = { fortune: "大吉", message: "今日は最高の日です！", class: "daikichi" };
      } else if (rand < 0.4) {
        result = { fortune: "中吉", message: "なかなか良い一日になりそうです", class: "chuukichi" };
      } else if (rand < 0.8) {
        result = { fortune: "小吉", message: "穏やかに過ごすと吉です", class: "shoukichi" };
      } else {
        result = { fortune: "凶", message: "無理せず慎重にいきましょう", class: "kyou" };
      }

      const resultDiv = document.getElementById("result");
      resultDiv.className = result.class;
      resultDiv.innerHTML = result.fortune + "<br><small>" + result.message + "</small>";
    }
  </script>

</body>
</html>
