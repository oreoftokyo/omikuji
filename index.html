<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>おみくじアプリ</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin-top: 100px;
      background: #f5f5f5;
    }
    h1 {
      font-size: 32px;
    }
    #result {
      font-size: 48px;
      margin: 30px 0;
      font-weight: bold;
      transition: all 0.3s;
    }

    .daikichi { color: gold; }
    .chuukichi { color: green; }
    .shoukichi { color: #333; }
    .kyou { color: red; }

    button {
      font-size: 18px;
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }

    #shareBtn {
      background: #1DA1F2;
    }
  </style>
</head>
<body>

  <h1>おみくじ</h1>
  <div id="result">ボタンを押してください</div>

  <button onclick="drawOmikuji()">引く</button>
  <br>
  <button id="shareBtn" onclick="shareResult()" style="display:none;">結果をシェア</button>

  <script>
    let currentResult = "";

    function drawOmikuji() {
      const resultDiv = document.getElementById("result");
      const shareBtn = document.getElementById("shareBtn");

      // 演出：いったん待つ
      resultDiv.className = "";
      resultDiv.innerHTML = "・・・";
      shareBtn.style.display = "none";

      setTimeout(() => {
        const rand = Math.random();
        let result = {};

        if (rand < 0.1) {
          result = { fortune: "大吉", message: "今日は最高の日です！", class: "daikichi" };
        } else if (rand < 0.4) {
          result = { fortune: "中吉", message: "なかなか良い一日になりそうです", class: "chuukichi" };
        } else if (rand < 0.8) {
          result = { fortune: "小吉", message: "穏やかに過ごすと吉です", class: "shoukichi" };
        } else {
          result = { fortune: "凶", message: "無理せず慎重にいきましょう", class: "kyou" };
        }

        resultDiv.className = result.class;
        resultDiv.innerHTML = result.fortune + "<br><small>" + result.message + "</small>";

        // シェア用テキスト保存
        currentResult = "今日のおみくじ結果は『" + result.fortune + "』でした！";

        // シェアボタン表示
        shareBtn.style.display = "inline-block";

      }, 500); // ←0.5秒待つ
    }

    function shareResult() {
      const url = "https://twitter.com/intent/tweet?text=" + encodeURIComponent(currentResult);
      window.open(url, "_blank");
    }
  </script>

</body>
</html>
